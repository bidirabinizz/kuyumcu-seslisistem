name: iOS App Build (Unsigned IPA)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Kodlari Cek (Checkout)
        uses: actions/checkout@v4

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Paketleri Indir
        working-directory: ./kuyumcu_sesli_sistem
        run: flutter pub get

      - name: CocoaPods Kurulumu
        working-directory: ./kuyumcu_sesli_sistem/ios
        run: |
          pod repo update
          pod install

      # İŞTE SON VURUŞ: Flutter CLI'ı devreden çıkarıp doğrudan Xcode'a emir veriyoruz
      - name: Dogrudan Xcode ile Derleme (Mimar Bypass)
        working-directory: ./kuyumcu_sesli_sistem/ios
        run: |
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=$PWD/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: IPA Dosyasini Paketle (Sideloadly Icin)
        working-directory: ./kuyumcu_sesli_sistem
        run: |
          mkdir Payload
          mv ios/build/Release-iphoneos/Runner.app Payload/
          zip -qq -r kuyumcu_sistem.ipa Payload

      - name: Ciktiyi GitHub'a Yukle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Kuyumcu-iOS-App
          path: kuyumcu_sesli_sistem/kuyumcu_sistem.ipa