name: iOS App Build (Unsigned IPA)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Kodlari Cek (Checkout)
        uses: actions/checkout@v4

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Paketleri Indir
        working-directory: ./kuyumcu_sesli_sistem
        run: flutter pub get

      - name: CocoaPods Kurulumu ve Guncellemesi
        working-directory: ./kuyumcu_sesli_sistem/ios
        run: |
          pod repo update
          pod install

      # İŞTE MİMAR DOKUNUŞU BURASI: Xcode'un imza şalterini zorla kapatıyoruz
      - name: Xcode Imza Zorunlulugunu Kapat
        working-directory: ./kuyumcu_sesli_sistem
        run: |
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = \"\"" >> ios/Flutter/Release.xcconfig

      - name: iOS Derlemesi Al (Imzasiz)
        working-directory: ./kuyumcu_sesli_sistem
        run: flutter build ios --release --no-codesign

      - name: IPA Dosyasini Paketle (Sideloadly Icin)
        working-directory: ./kuyumcu_sesli_sistem
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload
          zip -qq -r kuyumcu_sistem.ipa Payload

      - name: Ciktiyi GitHub'a Yukle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Kuyumcu-iOS-App
          path: kuyumcu_sesli_sistem/kuyumcu_sistem.ipa